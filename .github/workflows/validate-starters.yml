name: Validate Starters

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate validated starters
        run: python skills/saas-oss-accelerator/scripts/validate_starters.py --all --update-status --work-dir skills/saas-oss-accelerator/work/gha-starter-validation

      - name: Commit refreshed validation state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/saas-oss-accelerator/assets/trusted-starters.json
          if git diff --cached --quiet; then
            echo "No validated-set changes."
            exit 0
          fi
          git commit -m "chore: refresh starter validation"
          git push
